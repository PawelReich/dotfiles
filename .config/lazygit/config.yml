# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

git:
  commitPrefix:
    - pattern: "^(\\d+)-.*$"
      replace: "[#$1] "
  pagers:
    - externalDiffCommand: difft --display=inline --color=always
    - pager: delta --dark --paging=never --diff-so-fancy
  autoStageResolvedConflicts: false
customCommands:
  - key: 'F'
    context: 'files'
    command: 'git-absorb'
    description: 'Absorb staged files'
  - key: i
    context: localBranches
    description: Open issue in browser
    command: >
      set ISSUE $(echo "{{ .SelectedLocalBranch.Name }}" | awk -F'-' '{print $1}') &&
      xdg-open "https://dev.antmicro.com/issues/$ISSUE"
